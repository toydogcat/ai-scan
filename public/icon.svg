<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#064e3b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" fill="#020617" />
  <rect x="40" y="40" width="432" height="432" rx="80" fill="url(#grad)" fill-opacity="0.1" stroke="url(#grad)" stroke-width="8" />
  <!-- Stylized Scanner Frame -->
  <path d="M140 120 H100 V160" stroke="#10b981" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M372 120 H412 V160" stroke="#10b981" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M140 392 H100 V352" stroke="#10b981" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M372 392 H412 V352" stroke="#10b981" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Lens/Magnifier Icon -->
  <circle cx="256" cy="240" r="80" stroke="white" stroke-width="24" filter="url(#glow)" />
  <path d="M312 300 L380 368" stroke="white" stroke-width="24" stroke-linecap="round" filter="url(#glow)" />
  <!-- Laser Line -->
  <path d="M140 240 H372" stroke="#34d399" stroke-width="8" stroke-linecap="round" opacity="0.8" />
</svg>
